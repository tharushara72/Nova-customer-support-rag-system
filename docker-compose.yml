

services:
  rag-api:
    build: .
    container_name: customer-support-rag
    ports:
      - "8000:8000"
    env_file:
      - .env                        # loads GROQ_API_KEY automatically
    volumes:
      - ./artifacts:/app/artifacts  # FAISS index persists
      - ./logs:/app/logs            # logs persist
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped